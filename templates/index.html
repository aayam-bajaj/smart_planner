<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Planner | Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body { height: 100%; margin: 0; }
    #map { height: 100vh; width: 100%; }
  </style>
</head>
<body class="bg-slate-100">
  <div class="flex h-screen">
    <aside class="w-[360px] bg-white border-r border-slate-200 p-5 overflow-y-auto">
      <div class="mb-6">
        <div class="text-sm text-slate-500">Logged in as</div>
        <div class="text-2xl font-bold text-slate-900">{{ current_user.name }}</div>
        <div class="mt-3 flex gap-2">
          <a href="/logout" class="px-4 py-2 rounded-xl bg-slate-900 text-white text-sm">Logout</a>
          {% if current_user.is_admin %}
          <a href="/admin/dashboard" class="px-4 py-2 rounded-xl border border-slate-300 text-sm">Admin Dashboard</a>
          {% endif %}
        </div>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-4">
        <h2 class="font-semibold text-slate-900 mb-3">Your Preferences</h2>

        <label class="block text-sm mb-1">Max Slope: <span id="slopeValue">4</span>%</label>
        <input id="slope" type="range" min="0" max="20" value="{{ current_user.max_slope or 4 }}" class="w-full">

        <label class="block text-sm mb-1 mt-4">Comfort Weight: <span id="comfortValue">0.5</span></label>
        <input id="comfort" type="range" min="0" max="1" step="0.1" value="{{ current_user.comfort_weight or 0.5 }}" class="w-full">

        <label class="flex items-center gap-2 mt-4 text-sm">
          <input id="gravel" type="checkbox" {% if 'gravel' in current_user.disliked_surfaces %}checked{% endif %}>
          Avoid Gravel
        </label>

        <button id="save-profile" class="w-full mt-4 px-4 py-2 rounded-xl bg-emerald-500 text-white font-semibold">
          Save as Profile
        </button>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mb-4">
        <h2 class="font-semibold text-slate-900 mb-3">Saved Profiles</h2>
        <div id="profile-list">Loading...</div>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
        <h2 class="font-semibold text-slate-900 mb-3">Route Actions</h2>
        <button id="calculate-routes" class="w-full px-4 py-2 rounded-xl bg-slate-900 text-white font-semibold mb-2">
          Calculate Routes
        </button>
        <div class="grid grid-cols-2 gap-2">
          <button id="show-fastest" data-route="fastest" class="route-btn px-3 py-2 rounded-xl bg-slate-200 text-sm">Fastest</button>
          <button id="show-comfortable" data-route="comfortable" class="route-btn px-3 py-2 rounded-xl bg-slate-200 text-sm">Comfortable</button>
          <button id="show-accessible" data-route="accessible" class="route-btn px-3 py-2 rounded-xl bg-slate-200 text-sm">Accessible</button>
          <button id="show-all" data-route="all" class="route-btn px-3 py-2 rounded-xl bg-slate-200 text-sm">Show All</button>
        </div>
        <div class="grid grid-cols-3 gap-2 mt-3">
          <button id="zoom-all-btn" class="px-3 py-2 rounded-xl border border-slate-300 text-sm">Zoom All</button>
          <button id="focus-fastest-btn" class="px-3 py-2 rounded-xl border border-slate-300 text-sm">Focus Fastest</button>
          <button id="focus-comfortable-btn" class="px-3 py-2 rounded-xl border border-slate-300 text-sm">Focus Comfort</button>
        </div>
        <button id="focus-accessible-btn" class="w-full mt-2 px-3 py-2 rounded-xl border border-slate-300 text-sm">Focus Accessible</button>
      </div>

      <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 mt-4">
        <h2 class="font-semibold text-slate-900 mb-3">Route Details</h2>
        <div id="route-comparison" style="display:none;">
          <div id="route-stats"></div>
          <div id="segment-list"></div>
        </div>
      </div>
    </aside>

    <main class="flex-1 relative">
      <div class="search-panel">
    <div class="search-box">
        <label for="start-search">Start location</label>
        <div class="search-row">
            <input type="text" id="start-search" placeholder="Search start location">
            <button type="button" id="start-search-btn">Set Start</button>
        </div>
        <div id="start-suggestions" class="suggestions"></div>
    </div>

    <div class="search-box">
        <label for="end-search">End location</label>
        <div class="search-row">
            <input type="text" id="end-search" placeholder="Search end location">
            <button type="button" id="end-search-btn">Set End</button>
        </div>
        <div id="end-suggestions" class="suggestions"></div>
    </div>
</div>

<div id="map"></div>

      
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
